<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DOGS 狗狗人格测试</title>
    <meta
      name="description"
      content="24 道真实养狗场景题，生成治愈系狗狗人格卡和总结报告。"
    />
    <style>
:root {
  --cream: #fff8ec;
  --paper: #fffdf8;
  --oat: #ead7bd;
  --latte: #c79a72;
  --brown: #3b2c22;
  --muted: #8b674a;
  --sage: #dfead2;
  --mint: #e9f3ed;
  --peach: #f6dcc8;
  --line: rgba(92, 67, 47, 0.16);
  --shadow: 0 24px 70px rgba(91, 63, 36, 0.14);
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  background:
    radial-gradient(circle at 8% 8%, rgba(231, 241, 216, 0.95) 0 12rem, transparent 12.5rem),
    radial-gradient(circle at 92% 12%, rgba(246, 220, 200, 0.85) 0 14rem, transparent 14.5rem),
    linear-gradient(135deg, #fff8ec 0%, #fffdf7 52%, #eff6ed 100%);
  color: var(--brown);
  font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
}
button, input, select { font: inherit; }
button { cursor: pointer; }

.site-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 42px 0 72px; }
.hero { display: grid; grid-template-columns: minmax(0, 1.1fr) 420px; gap: 34px; align-items: stretch; min-height: 620px; }
.hero-solo { grid-template-columns: minmax(0, 1fr); min-height: auto; }
.hero-copy, .hero-card, .quiz-panel, .result-section, .waiting-card, .system-section {
  border: 1px solid var(--line);
  background: rgba(255, 253, 248, 0.86);
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
}
.hero-copy { border-radius: 42px; padding: clamp(32px, 6vw, 74px); display: flex; flex-direction: column; justify-content: center; }
.hero-solo .hero-copy { max-width: 860px; margin: 0 auto; width: 100%; text-align: center; }
.hero-solo .hero-text { margin: 0 auto; }
.hero-solo .hero-actions { justify-content: center; }
.eyebrow { margin: 0 0 14px; color: var(--latte); font-size: .86rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
h1, h2, h3, p { margin-top: 0; }
h1 { max-width: 760px; margin-bottom: 22px; font-size: clamp(2.7rem, 6vw, 5.4rem); font-weight: 900; letter-spacing: -.06em; line-height: 1.02; }
.title-line { display: block; }
.hero-text, .public-note { max-width: 680px; color: var(--muted); font-size: clamp(1rem, 2vw, 1.22rem); line-height: 1.9; }
.hero-text { display: grid; gap: 8px; }
.hero-text-line { display: block; }
.public-note { margin-top: 12px; padding: 14px 16px; border-radius: 20px; background: #f2f7ec; color: #6e8057; font-weight: 700; }
.hero-actions, .result-actions { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 28px; }
.primary-link, .secondary-link, .result-actions button {
  border: 0;
  border-radius: 999px;
  padding: 14px 22px;
  text-decoration: none;
  font-weight: 800;
  transition: transform .2s ease, box-shadow .2s ease;
}
.primary-link, .result-actions button:not(.ghost-button) { background: var(--brown); color: #fff9ed; box-shadow: 0 12px 26px rgba(59, 44, 34, .24); }
.secondary-link, .ghost-button { background: #f5ead8; color: var(--brown); }
.primary-link:hover, .secondary-link:hover, .result-actions button:hover { transform: translateY(-2px); }

.hero-card {
  border-radius: 42px;
  padding: 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero-card::before, .share-card::before {
  content: "";
  position: absolute;
  inset: 16px;
  border: 2px dashed rgba(139, 103, 74, .18);
  border-radius: 30px;
  pointer-events: none;
}
.paw {
  width: 74px;
  height: 74px;
  margin: 0 auto 28px;
  border-radius: 50%;
  background: var(--sage);
  color: var(--latte);
  display: grid;
  place-items: center;
  font-size: 36px;
}
.hero-card p { color: var(--muted); font-weight: 900; letter-spacing: .08em; }
.hero-card strong { display: block; font-size: clamp(4rem, 11vw, 6.5rem); letter-spacing: -.08em; line-height: 1; }
.hero-card h2 { margin: 12px 0 24px; font-size: 1.7rem; }

.mini-tags, .card-keywords, .report-tags { display: flex; flex-wrap: wrap; gap: 10px; }
.mini-tags { justify-content: center; }
.mini-tags span, .card-keywords em, .report-tags em {
  border-radius: 999px;
  background: #f6efe2;
  color: var(--muted);
  padding: 8px 12px;
  font-style: normal;
  font-weight: 700;
}

.system-section, .quiz-section, .result-section, .waiting-card { margin-top: 34px; }
.system-section { border-radius: 38px; padding: clamp(24px, 4vw, 44px); }
.section-heading { max-width: 760px; }
.section-heading h2 { margin-bottom: 10px; font-size: clamp(2rem, 4vw, 3.2rem); line-height: 1.08; letter-spacing: -.05em; }
.section-heading p:not(.eyebrow), .report-body, .waiting-card p, .overview-copy p, .report-list-item p, .bar-item small, .report-tagline { color: var(--muted); line-height: 1.9; }
.centered { margin: 0 auto 28px; text-align: center; }

.axis-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; margin-top: 28px; }
.axis-card, .question-card, .report-block {
  border: 1px solid var(--line);
  border-radius: 28px;
  background: rgba(255,255,255,.58);
}
.axis-card { padding: 22px; }
.axis-card span { color: var(--latte); font-size: .88rem; font-weight: 800; }
.axis-card h3 { margin: 14px 0 12px; font-size: 2.1rem; }
.axis-card em { color: var(--oat); font-style: normal; }
.axis-card p { min-height: 70px; color: var(--muted); line-height: 1.7; }
.axis-card div { display: flex; justify-content: space-between; color: var(--muted); }

.quiz-panel { border-radius: 42px; padding: clamp(22px, 4vw, 44px); }
.profile-row { display: grid; grid-template-columns: 1fr 220px; gap: 16px; margin: 24px 0; }
label { display: grid; gap: 10px; color: var(--muted); font-weight: 800; }
input, select {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 20px;
  background: #fffaf1;
  color: var(--brown);
  outline: none;
  padding: 15px 16px;
}
input:focus, select:focus { border-color: rgba(199,154,114,.8); box-shadow: 0 0 0 4px rgba(199,154,114,.14); }
.progress-wrap {
  position: sticky;
  top: 12px;
  z-index: 5;
  border: 1px solid var(--line);
  border-radius: 24px;
  background: rgba(255,253,248,.92);
  padding: 16px;
  backdrop-filter: blur(12px);
}
.progress-wrap > div:first-child, .bar-item > div:first-child {
  display: flex;
  justify-content: space-between;
  color: var(--muted);
  font-weight: 800;
}
.progress-track, .bar-track {
  height: 12px;
  margin-top: 10px;
  border-radius: 999px;
  background: #f1e3cf;
  overflow: hidden;
}
.progress-track i, .bar-track i {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, #d8b28c, #92aa75);
  transition: width .28s ease;
}
.question-list { display: grid; gap: 18px; margin-top: 24px; }
.question-card { padding: 20px; }
.question-title { display: grid; grid-template-columns: 54px 1fr; gap: 14px; align-items: start; margin-bottom: 16px; }
.question-title span {
  border-radius: 18px;
  background: var(--sage);
  color: var(--muted);
  display: grid;
  place-items: center;
  height: 46px;
  font-weight: 900;
}
.question-title h3 { margin: 6px 0 0; font-size: 1.22rem; line-height: 1.5; }
.option-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
.option {
  min-height: 74px;
  border: 1px solid var(--line);
  border-radius: 22px;
  background: #fffaf1;
  color: var(--brown);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px;
  text-align: left;
  line-height: 1.55;
  transition: transform .18s ease, border-color .18s ease, background .18s ease;
}
.option b {
  width: 34px;
  height: 34px;
  flex: 0 0 auto;
  border-radius: 50%;
  background: #f0dfca;
  color: var(--muted);
  display: grid;
  place-items: center;
}
.option:hover, .option.selected { transform: translateY(-1px); border-color: rgba(146,170,117,.75); background: #f2f7ec; }
.option.selected b { background: #92aa75; color: #fff; }

.result-section { border-radius: 42px; padding: clamp(24px, 4vw, 48px); }
.result-layout { display: grid; grid-template-columns: 420px 1fr; gap: 22px; align-items: start; }
.share-card {
  position: relative;
  overflow: hidden;
  min-height: 620px;
  border-radius: 38px;
  background: radial-gradient(circle at 20% 10%, rgba(223,234,210,.9), transparent 28%), radial-gradient(circle at 90% 18%, rgba(246,220,200,.9), transparent 30%), #fffdf8;
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.share-card p { color: var(--muted); font-weight: 900; letter-spacing: .08em; }
.share-card strong { display: block; line-height: 1.1; }
.share-card > span, .share-card small { color: var(--muted); font-weight: 800; }
.share-card blockquote { margin: 18px 0 0; color: var(--brown); font-size: 1.05rem; line-height: 1.8; }
.result-card-media {
  position: relative;
  z-index: 1;
  border-radius: 26px;
  overflow: hidden;
  background: #fff7ea;
  border: 1px solid rgba(139, 103, 74, 0.14);
  box-shadow: 0 16px 40px rgba(91, 63, 36, 0.12);
}
.result-card-media img { display: block; width: 100%; height: auto; }
.share-card-fallback {
  position: relative;
  z-index: 1;
  min-height: 420px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
  padding: 18px 12px;
}
.share-card-fallback strong { font-size: 6rem; letter-spacing: -.08em; }
.share-card-fallback h3 { margin: 14px 0 18px; font-size: 2rem; }
.share-card-footer { position: relative; z-index: 1; display: grid; gap: 8px; padding: 6px 4px 2px; }
.share-card-label {
  margin: 0;
  color: var(--latte) !important;
  font-size: .82rem;
  font-weight: 900;
  letter-spacing: .12em !important;
  text-transform: uppercase;
}
.share-card-footer strong { font-size: 1.6rem; color: var(--brown); }
.share-card-footer span { color: var(--muted); font-weight: 800; }
.share-card-footer small { line-height: 1.7; }

.report-stack { display: grid; gap: 16px; }
.report-block { padding: 22px; }
.report-block-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}
.report-kicker {
  color: var(--latte);
  font-size: .86rem;
  font-weight: 900;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.report-block-head strong { color: var(--brown); font-size: 1.3rem; }
.identity-block h3 { margin-bottom: 10px; font-size: 1.9rem; line-height: 1.2; }
.report-tagline { margin-bottom: 14px; font-weight: 800; }
.report-body { margin: 0; }
.report-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 12px; }
.report-list-item {
  display: grid;
  grid-template-columns: 16px 1fr;
  gap: 10px;
  align-items: start;
  padding: 14px 16px;
  border-radius: 20px;
  border: 1px solid rgba(139, 103, 74, 0.12);
  background: #fffaf1;
}
.report-list-item span { color: var(--latte); font-size: 1rem; line-height: 1.5; font-weight: 900; }
.report-list-item p { margin: 0; }
.report-list-item-tips { background: #f7f3ea; }
.report-list-item-warning { background: #fff4eb; }
.report-list-item-soft { background: #f2f7ec; }

.bar-list { display: grid; gap: 18px; }
.overview-details {
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 24px;
  background: rgba(246, 239, 226, 0.62);
}
.overview-summary {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 132px;
  gap: 16px;
  align-items: center;
  list-style: none;
  cursor: zoom-in;
}
.overview-summary::-webkit-details-marker { display: none; }
.overview-copy {
  display: grid;
  gap: 10px;
}
.overview-copy strong {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: fit-content;
  min-height: 42px;
  padding: 0 16px;
  border-radius: 999px;
  background: var(--brown);
  color: #fff9ed;
  font-weight: 800;
}
.overview-summary img,
.overview-expanded img {
  width: 100%;
  border-radius: 18px;
  border: 1px solid rgba(139, 103, 74, 0.14);
  box-shadow: 0 10px 24px rgba(91, 63, 36, 0.12);
}
.overview-expanded {
  display: grid;
  gap: 12px;
  margin-top: 18px;
}
.overview-expanded p {
  margin: 12px 0 0;
  color: var(--muted);
  text-align: center;
  font-weight: 800;
}

.waiting-card { border-radius: 34px; padding: 34px; text-align: center; }

@media (max-width: 920px) {
  .hero, .result-layout, .axis-grid { grid-template-columns: 1fr; }
  .hero { min-height: auto; }
  .axis-card p { min-height: auto; }
  .overview-summary { grid-template-columns: 1fr; }
  .overview-summary img { max-width: 220px; }
}

@media (max-width: 640px) {
  .site-shell { width: min(100% - 20px, 1180px); padding-top: 20px; }
  .hero-copy, .hero-card, .quiz-panel, .result-section, .system-section { border-radius: 28px; }
  h1 { font-size: 3.15rem; }
  .profile-row, .option-grid { grid-template-columns: 1fr; }
  .question-title { grid-template-columns: 1fr; }
  .share-card { min-height: auto; padding: 18px; }
  .share-card-fallback strong { font-size: 4.8rem; }
  .share-card-footer strong { font-size: 1.28rem; }
}

</style>
  </head>
  <body>
    <main class="site-shell">
      <section class="hero hero-solo">
        <div class="hero-copy">
          <p class="eyebrow">DOGS 狗狗人格测试 · 2026最新版</p>
          <h1>
            <span class="title-line">测出你家狗狗</span>
            <span class="title-line">的隐藏人格</span>
          </h1>
          <p class="hero-text">
            <span class="hero-text-line">24 道真实养狗场景题，从驱动力、探索度、守护度和社交度四个维度，解读狗狗心理特征，了解它的性格偏好。</span>
            <span class="hero-text-line">陪伴一生的家人，它懂你，你更要懂它。</span>
          </p>
          <div class="hero-actions">
            <a href="#quiz" class="primary-link">开始测试</a>
            <a href="#system" class="secondary-link">查看维度</a>
          </div>
        </div>
      </section>

      <section id="system" class="system-section">
        <div class="section-heading">
          <p class="eyebrow">不是玄学，是行为观察</p>
          <h2>4 个维度，组合出 16 种狗狗人格</h2>
        </div>
        <div id="axis-grid" class="axis-grid"></div>
      </section>

      <section id="quiz" class="quiz-section">
        <div class="quiz-panel">
          <div class="section-heading">
            <p class="eyebrow">开始前先写下它的名字</p>
            <h2>为它生成专属报告</h2>
          </div>
          <div class="profile-row">
            <label>
              狗狗昵称
              <input id="dog-name" value="我家狗狗" maxlength="16" />
            </label>
            <label>
              年龄阶段
              <select id="dog-age">
                <option>幼犬</option>
                <option selected>成年犬</option>
                <option>老年犬</option>
                <option>不确定</option>
              </select>
            </label>
          </div>

          <div class="progress-wrap" aria-label="答题进度">
            <div>
              <span id="progress-label">已完成 0/24</span>
              <strong id="progress-percent">0%</strong>
            </div>
            <div class="progress-track"><i id="progress-bar"></i></div>
          </div>

          <div id="question-list" class="question-list"></div>
        </div>
      </section>

      <section id="result-root" class="waiting-card">
        <h2>答完 24 题后，这里会生成完整报告和可晒卡片</h2>
      </section>
    </main>

    <script>
const dogAxes = {
  drive: {
    label: "Drive 驱动力",
    high: "D",
    low: "C",
    highName: "动力型",
    lowName: "松弛型",
  },
  openness: {
    label: "Openness 探索度",
    high: "O",
    low: "R",
    highName: "探索型",
    lowName: "谨慎型",
  },
  guarding: {
    label: "Guarding 守护度",
    high: "G",
    low: "E",
    highName: "守护型",
    lowName: "随和型",
  },
  sociability: {
    label: "Sociability 社交度",
    high: "S",
    low: "I",
    highName: "社牛型",
    lowName: "独立型",
  },
};

const axisOrder = ["drive", "openness", "guarding", "sociability"];
const optionTieWeights = { a: 1, b: 2, c: 3, d: 4 };
const optionPositionValues = { a: 2, b: 1, c: -1, d: -2 };
const calibrationDeadzone = 0.25;
const calibrationScale = 1.5;
const maxCalibrationBias = 0.65;

function scoreAxis(axis, value) {
  return {
    drive: 0,
    openness: 0,
    guarding: 0,
    sociability: 0,
    [axis]: value,
  };
}

const high = (axis) => scoreAxis(axis, 2);
const softHigh = (axis) => scoreAxis(axis, 1);
const softLow = (axis) => scoreAxis(axis, -1);
const low = (axis) => scoreAxis(axis, -2);

const dogQuestions = [
  {
    id: "q1",
    axis: "drive",
    text: "出门遛弯时，你家狗狗通常是？",
    options: [
      { id: "a", text: "一出门就兴奋冲在前面", scores: high("drive") },
      { id: "b", text: "节奏轻快，愿意往前走", scores: softHigh("drive") },
      { id: "c", text: "更喜欢慢慢走，不太主动加速", scores: softLow("drive") },
      { id: "d", text: "需要你多带一带，热身后才进入状态", scores: low("drive") },
    ],
  },
  {
    id: "q2",
    axis: "guarding",
    text: "家里来了陌生人，它第一反应更像？",
    options: [
      { id: "a", text: "主动上前闻闻，想认识一下", scores: low("guarding") },
      { id: "b", text: "先看一眼气氛，再决定要不要靠近", scores: softLow("guarding") },
      { id: "c", text: "会保持距离，留意对方动向", scores: softHigh("guarding") },
      { id: "d", text: "会挡在家人附近，警觉很明显", scores: high("guarding") },
    ],
  },
  {
    id: "q3",
    axis: "openness",
    text: "它对新玩具的反应通常是？",
    options: [
      { id: "a", text: "立刻扑上去研究和开玩", scores: high("openness") },
      { id: "b", text: "先闻一闻，再慢慢尝试", scores: softHigh("openness") },
      { id: "c", text: "兴趣一般，更偏爱熟悉的玩具", scores: softLow("openness") },
      { id: "d", text: "会绕开或明显犹豫", scores: low("openness") },
    ],
  },
  {
    id: "q4",
    axis: "drive",
    text: "平时在家，它的精力状态更像？",
    options: [
      { id: "a", text: "随时都能开机，玩很久都不嫌累", scores: high("drive") },
      { id: "b", text: "有兴奋时段，但也会自己收住", scores: softHigh("drive") },
      { id: "c", text: "大部分时间比较安静，喜欢慢节奏", scores: softLow("drive") },
      { id: "d", text: "更爱趴着休息，通常不主动折腾", scores: low("drive") },
    ],
  },
  {
    id: "q5",
    axis: "guarding",
    text: "听到门外有动静时，它通常会？",
    options: [
      { id: "a", text: "基本不当回事，照常待着", scores: low("guarding") },
      { id: "b", text: "会抬头听一下，很快就放松", scores: softLow("guarding") },
      { id: "c", text: "会起身确认一下发生了什么", scores: softHigh("guarding") },
      { id: "d", text: "会立刻到门口盯着或提醒你", scores: high("guarding") },
    ],
  },
  {
    id: "q6",
    axis: "sociability",
    text: "它和其他狗狗相处时更像？",
    options: [
      { id: "a", text: "主动靠近，想一起玩", scores: high("sociability") },
      { id: "b", text: "看对方状态，合适才互动", scores: softHigh("sociability") },
      { id: "c", text: "不太主动，更喜欢自己待着", scores: softLow("sociability") },
      { id: "d", text: "明显不想社交，会保持距离", scores: low("sociability") },
    ],
  },
  {

  Object.entries(baseDogResults).map(([code, result]) => [
    code,

function sumTieWeight(answers, questions) {
  return questions.reduce((sum, question) => sum + (optionTieWeights[answers[question.id]] ?? 0), 0);
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function getAxisOptionPolarity(axis, questions) {
  const polarity = questions.reduce(
    (sum, question) =>
      sum +
      question.options.reduce(
        (optionSum, option) => optionSum + (optionPositionValues[option.id] ?? 0) * (option.scores[axis] ?? 0),
        0,
      ),
    0,
  );

  return polarity >= 0 ? 1 : -1;
}

function getAnswerPositionBias(answers) {
  const positionScore = dogQuestions.reduce(
    (sum, question) => sum + (optionPositionValues[answers[question.id]] ?? 0),
    0,
  );
  const averageBias = positionScore / dogQuestions.length;
  const magnitude = Math.max(0, Math.abs(averageBias) - calibrationDeadzone) * calibrationScale;

  return Math.sign(averageBias) * Math.min(maxCalibrationBias, magnitude);
}

function calculateCalibratedPercentage(score, threshold, maxScore) {
  const minScore = -maxScore;

  if (score >= threshold) {
    const highRange = Math.max(1, maxScore - threshold);
    return Math.round(50 + ((score - threshold) / highRange) * 50);
  }

  const lowRange = Math.max(1, threshold - minScore);
  return Math.round(((score - minScore) / lowRange) * 50);
}

function determineAxisCode(axis, score, positiveCount, negativeCount, answers, questions, threshold) {
  if (score > threshold) return dogAxes[axis].high;
  if (score < threshold) return dogAxes[axis].low;
  if (positiveCount > negativeCount) return dogAxes[axis].high;
  if (negativeCount > positiveCount) return dogAxes[axis].low;
  return sumTieWeight(answers, questions) % 2 === 0 ? dogAxes[axis].high : dogAxes[axis].low;
}

function calculateDogPersonality(answers) {
  const scores = { drive: 0, openness: 0, guarding: 0, sociability: 0 };
  const positiveCounts = { drive: 0, openness: 0, guarding: 0, sociability: 0 };
  const negativeCounts = { drive: 0, openness: 0, guarding: 0, sociability: 0 };
  const questionsByAxis = Object.fromEntries(axisOrder.map((axis) => [axis, []]));

  for (const question of dogQuestions) {
    questionsByAxis[question.axis].push(question);
    const selected = question.options.find((option) => option.id === answers[question.id]);
    if (!selected) continue;

    for (const axis of axisOrder) {
      const axisScore = selected.scores[axis] ?? 0;
      scores[axis] += axisScore;
      if (axisScore > 0) positiveCounts[axis] += 1;
      if (axisScore < 0) negativeCounts[axis] += 1;
    }
  }

  const answerPositionBias = getAnswerPositionBias(answers);
  const calibrationThresholds = Object.fromEntries(
    axisOrder.map((axis) => [
      axis,
      answerPositionBias * questionsByAxis[axis].length * getAxisOptionPolarity(axis, questionsByAxis[axis]),
    ]),
  );

  const axisCodes = Object.fromEntries(
    axisOrder.map((axis) => [
      axis,
      determineAxisCode(
        axis,
        scores[axis],
        positiveCounts[axis],
        negativeCounts[axis],
        answers,
        questionsByAxis[axis],
        calibrationThresholds[axis],
      ),
    ]),
  );

  const maxScores = Object.fromEntries(
    axisOrder.map((axis) => [
      axis,
      questionsByAxis[axis].reduce(
        (sum, question) =>
          sum + Math.max(...question.options.map((option) => Math.abs(option.scores[axis] ?? 0))),
        0,
      ),
    ]),
  );

  const percentages = Object.fromEntries(
    axisOrder.map((axis) => {
      const maxScore = maxScores[axis] || 1;
      const percentage = calculateCalibratedPercentage(scores[axis], calibrationThresholds[axis], maxScore);
      return [axis, Math.max(0, Math.min(100, percentage))];
    }),
  );

  const code = axisOrder.map((axis) => axisCodes[axis]).join("");
  const result = dogResults[code] ?? dogResults.COEI;

  return {
    code,
    axisCodes,
    scores,
    percentages,
    ...result,
    disclaimer: "这是行为观察型趣味测试，不替代兽医诊断或专业行为评估。",
  };
}

function escapeXml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

function encodeAssetPath(path) {
  return encodeURI(path).replaceAll("#", "%23");
}

function getPersonalityCardPath(code) {
  const path = personalityCardAssets[code];
  return path ? encodeAssetPath(path) : "";
